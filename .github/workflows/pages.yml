name: Deploy Site

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Deploy Site
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/configure-pages@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Setup allegro-ts
        run: |
          npm ci
          npm run build

      - name: Setup site
        working-directory: ./docs
        run: |
          npm ci
          npm run build

      - uses: actions/upload-pages-artifact@v4
        with:
          path: ./docs/.vitepress/dist

      - uses: actions/deploy-pages@v4
        id: deployment
